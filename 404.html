<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — CNR Digital</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a1628;
      color: #fff;
      font-family: 'Montserrat', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .logo {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      margin-bottom: 64px;
      letter-spacing: 1px;
    }
    .logo span { color: #c9a84c; }
    .code {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(100px, 20vw, 160px);
      font-weight: 700;
      color: #c9a84c;
      opacity: 0.2;
      line-height: 1;
    }
    h1 {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 700;
      margin-top: 8px;
      margin-bottom: 16px;
    }
    p {
      font-size: 13px;
      color: #8a9ab5;
      line-height: 1.7;
      max-width: 360px;
      margin-bottom: 40px;
    }
    a.btn {
      display: inline-block;
      padding: 12px 32px;
      border: 1px solid #c9a84c;
      color: #c9a84c;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.2s;
    }
    a.btn:hover { background: #c9a84c; color: #0a1628; }
  </style>
</head>
<body>
  <a href="/" class="logo"><span>CNR</span> Digital</a>
  <div class="code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  <a href="/" class="btn">Back to Home</a>
</body>
</html>
