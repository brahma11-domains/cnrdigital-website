<?xml version="1.0" encoding="UTF-8"?>
<svg id="cnr-logo" width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pg" cx="38%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#1a3060"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
    <linearGradient id="gd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8b86a"/>
      <stop offset="55%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#a8852e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#pg)"/>
  <!-- Subtle ring -->
  <circle cx="200" cy="200" r="178" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.4"/>
  <!-- CNR -->
  <text x="200" y="226"
        font-family="Georgia, serif"
        font-size="154"
        font-weight="700"
        text-anchor="middle"
        fill="url(#gd)"
        letter-spacing="4">CNR</text>
  <!-- Gold divider -->
  <line x1="68" y1="258" x2="332" y2="258" stroke="#c9a84c" stroke-width="0.9" opacity="0.65"/>
  <!-- DIGITAL -->
  <text x="200" y="300"
        font-family="Georgia, serif"
        font-size="30"
        font-weight="400"
        text-anchor="middle"
        fill="url(#gd)"
        letter-spacing="10">DIGITAL</text>
</svg>
